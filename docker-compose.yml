#version: "3.9"

# ── TN2026 Election Intelligence System ──────────────────
# 3 containers, total memory target < 900MB on t2.micro
# ─────────────────────────────────────────────────────────

services:

  # ── 1. MongoDB ─────────────────────────────────────────
  mongo:
    image: mongo:7.0.8-jammy
    container_name: tn2026_mongo
    restart: unless-stopped
    command: >
      mongod
      --wiredTigerCacheSizeGB 0.25
      --quiet
      --logpath /dev/null
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tn2026
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M
    networks:
      - tn_net

  # ── 2. Backend (FastAPI + ML) ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tn2026_backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: tn2026
      MODEL_DIR: /app/models
      LOG_LEVEL: WARNING
      LIVE_MODE: "false"          # set "true" on election day
      FRONTEND_URL: "*"
      OMP_NUM_THREADS: "1"        # prevent thread explosion
      OPENBLAS_NUM_THREADS: "1"
      PYTHONPATH: /app            # ensure scraper module is found
    volumes:
      - model_data:/app/models    # persist trained models
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 200M
    networks:
      - tn_net

  # ── 3. Frontend (React + Nginx) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: tn2026_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - tn_net

# ── Volumes ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  model_data:
    driver: local

# ── Network ─────────────────────────────────────────────
networks:
  tn_net:
    driver: bridge
